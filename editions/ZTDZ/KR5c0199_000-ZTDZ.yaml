front:
  text: 正一醮墓儀
  hash: sha256:a6b5371a2f6043b966b43f9e3f29f170db734219fb4741b1ccebd5600a586c11
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0199_SJB_000-180299c, image: sjb/18/180299c.png}
body:
  text: 凡人墓山年月深久或有崩壞須得𥙷葺或時凶衰地氣王動致令子孫貧耗遭非横禍百事不利者須饗祭墓之山川土地神祇安穩亡人即得子孫平安所向吉利細席三十五領無席用淨茅大席二領香一兩小案一面香鑪四具小盤三十五枚黍米飯五升粳米飯三升粟米飯一升胡桃七十顆乾棗三十五顆栗子一升餅三十五枚淨水刀鋤供用竹纂四枚枚長一丈二尺漆盤一面小繩一條長三丈六尺銅鏡一面鹽一斗二升豉一斗二升右件物隨豐儉量之於墓近道左治地爲壇方三丈六尺四角立標壇中央設五方神座次外設二十四神座次外四方設阡陌座墓前左設亭長座右設丈人座座列細席一領飲食一盤所用鎭幣錢物並隨時豐儉但令合五行四維支干數唯須精新不得穢汙預前一日潔淨營辦其日設飲食於壇東南祭官立於壇南祝人在壇西南弟子立於壇東執事升壇布幣進食置香鑪於壇内四角先上香再拜跪讀祝文出家法師但坐不拜維年歲月朔日某官位無官者州縣鄕里姓名敢昭告于后土五方五行諸神此境山川百靈某家丘墓阡陌之神徃以龜筮襲吉於此山源爲亡祖考安厝宅兆青龍白虎左右相扶朱雀玄武前後相對置立塋域整齊阡陌千年萬載永附山源但以年月幽深丘墳蕭索或四靈失守八將無依蒿里明靈不垂冥祐屯戹者云比年以來居家屯坎舉向衰耗無所良宜當得翻失應成却敗錢財流散官事紛紜田種薄收蠶桑不熟子孫傷夭仕宦不遷日甚憂惶無以取濟謹以今日奉齎薄禮并及雜物庶羞備具獻上至誠奉請后土諸神丘墓丈人二十四位功曹傳送阡陌諸神願並率所部降臨其位次第而坐饗受所獻弟子再拜次上香上茶上酒謹重上白后土諸神等某先人末胤奕代承家恐山宅之不安懼宗禋之罔嗣敬以今日誠心設醮伏乞亡者魂寜於幽室子孫獲慶於將來惟此山岡鬰鬰蒼蒼年年興盛代代富昌上合天文下符地理左陪金匱右帶玉堂男女位備無所不良五方錢財歸流生人子孫富貴仕宦高遷門戸强盛兒女貞賢田蠶豐熟財積如山寳貨充滿車馬駢闐安倉鎭庫豐溢無量亡人受恩利祐子孫弟子再拜次上香上酒向來至誠殷勤奉請馨香旣薦言謝巳陳禮物輕微意慕欽重仰蒙洪澤饗納微誠再拜三謝之禮悉以周徧鎭謝之物旣蒙受納願嚴神駕各還所止請道路將軍瞻察前後浮遊邪魅驅令蒿里丈人丘墓長寧后代子孫昌盛福祐蟬聮一如律令再拜行事畢其阡陌座物當分埋之於壇東南角舒席於墓前迴食盤與亡人上食呪訖並分散令盡凡平收日不用醮墓凶墓神正月在子寅卯辰申戌亥二月在子亥三月在卯巳午申戌亥四月在巳午未戌亥五月並同六月在丑卯辰巳未亥七月八月在寅九月在子丑寅辰未戌十月在卯戌亥十一月在子卯辰午未申酉戌亥十二月在丑寅卯辰巳亥右件池犯之殺人凶若去墓十五歩外無忌其日亦不得祭墓正一醮墓儀
